services:
  backend:
    image: ${LECROWNPLATFORM_API_IMAGE:-ghcr.io/benlagrone/lecrown-platform-api:latest}
    build:
      context: ../../backend
    restart: unless-stopped
    env_file:
      - ${PLATFORM_ENV_FILE:-./.env}
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/lecrown.db}
    ports:
      - "${PLATFORM_API_BIND:-127.0.0.1:18035}:8000"
    volumes:
      - lecrown-platform-data:/app/data

  frontend:
    image: ${LECROWNPLATFORM_ADMIN_IMAGE:-ghcr.io/benlagrone/lecrown-platform-admin:latest}
    build:
      context: ../../frontend
      dockerfile: admin/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    ports:
      - "${PLATFORM_FRONTEND_BIND:-127.0.0.1:13084}:3000"
    depends_on:
      - backend

volumes:
  lecrown-platform-data:
