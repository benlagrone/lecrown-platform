name: Publish LeCrown Platform Images

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Fortress deploy environment
        required: true
        default: prod
        type: choice
        options:
          - prod
      run_public_smoke:
        description: Run fortress public smoke after deploy
        required: true
        default: false
        type: boolean
      dispatch_fortress_deploy:
        description: Dispatch fortress deploy after image publish
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image: ghcr.io/benlagrone/lecrown-platform-api
          - name: admin
            context: ./frontend
            dockerfile: ./frontend/admin/Dockerfile
            image: ghcr.io/benlagrone/lecrown-platform-admin
            build_args: |
              VITE_API_BASE_URL=https://api.lecrowndevelopment.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}

  dispatch_fortress_deploy:
    needs: publish
    if: ${{ github.event_name == 'push' || inputs.dispatch_fortress_deploy }}
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENVIRONMENT: ${{ github.event_name == 'push' && 'prod' || inputs.environment }}
      RUN_PUBLIC_SMOKE: ${{ github.event_name == 'push' && 'true' || inputs.run_public_smoke }}
    steps:
      - name: Dispatch Fortress Deploy
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.FORTRESS_REPO_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "FORTRESS_REPO_DISPATCH_TOKEN is required to dispatch fortress deploys" >&2
            exit 1
          fi

          gh api repos/benlagrone/fortress-phronesis/dispatches \
            -f event_type=deploy-lecrown-platform \
            -F client_payload[source_sha]="${GITHUB_SHA}" \
            -F client_payload[environment]="${DEPLOY_ENVIRONMENT}" \
            -F client_payload[run_public_smoke]="${RUN_PUBLIC_SMOKE}"

      - name: Deployment Summary
        shell: bash
        run: |
          {
            echo "## Fortress Deploy Dispatch"
            echo ""
            echo "- Source SHA: \`${GITHUB_SHA}\`"
            echo "- Environment: \`${DEPLOY_ENVIRONMENT}\`"
            echo "- Public smoke: \`${RUN_PUBLIC_SMOKE}\`"
            echo "- Event type: \`deploy-lecrown-platform\`"
          } >> "$GITHUB_STEP_SUMMARY"
